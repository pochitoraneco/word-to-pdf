<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DocFlow — Word to PDF</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
:root {
  --ink: #1a1410; --paper: #faf8f4; --cream: #f0ece3;
  --accent: #c8501a; --accent-light: #f4e8e1; --gold: #c9a84c;
  --muted: #8a7f72; --border: #ddd8cc; --success: #2d7d4e;
  --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

header {
  width: 100%; background: var(--ink); color: var(--paper);
  padding: 28px 40px 20px; display: flex; align-items: flex-end; gap: 16px; position: relative; overflow: hidden;
}
header::before { content:''; position:absolute; top:-40px; right:-40px; width:200px; height:200px; border-radius:50%; background:var(--accent); opacity:.18; }
.logo-mark { width:48px; height:48px; background:var(--accent); border-radius:12px; display:flex; align-items:center; justify-content:center; font-family:'DM Serif Display',serif; font-size:22px; color:white; flex-shrink:0; }
.header-text h1 { font-family:'DM Serif Display',serif; font-size:26px; font-weight:400; }
.header-text p { font-size:12px; color:rgba(250,248,244,.5); margin-top:3px; }
.ver-badge { margin-left:auto; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); border-radius:20px; padding:4px 12px; font-size:12px; color:rgba(250,248,244,.7); font-weight:500; flex-shrink:0; align-self:center; }

main { width:100%; max-width:800px; padding:36px 20px 60px; display:flex; flex-direction:column; gap:24px; }

.drop-zone { border:2.5px dashed var(--border); border-radius:var(--radius); background:var(--cream); padding:48px 24px; text-align:center; cursor:pointer; transition:all .25s; }
.drop-zone.drag-over { border-color:var(--accent); background:var(--accent-light); }
.drop-zone.has-file { border-color:var(--success); background:#edf7f1; }
.drop-icon { width:68px; height:68px; margin:0 auto 18px; background:white; border-radius:18px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 20px rgba(0,0,0,.08); font-size:34px; transition:transform .3s; }
.drop-zone:hover .drop-icon { transform:translateY(-4px); }
.drop-title { font-family:'DM Serif Display',serif; font-size:20px; margin-bottom:6px; }
.drop-sub { font-size:13px; color:var(--muted); margin-bottom:20px; }
.btn-browse { display:inline-flex; align-items:center; gap:8px; background:var(--ink); color:var(--paper); border:none; padding:13px 26px; border-radius:50px; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:500; cursor:pointer; transition:all .2s; -webkit-tap-highlight-color:transparent; }
.btn-browse:hover { background:var(--accent); }
.btn-browse:active { transform:scale(.97); }
input[type="file"] { display:none; }

.file-card { background:white; border:1.5px solid var(--border); border-radius:var(--radius); padding:18px 20px; display:flex; align-items:center; gap:14px; animation:slideIn .3s ease; }
@keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.file-icon { width:50px; height:50px; background:#e8f4fe; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
.file-info { flex:1; min-width:0; }
.file-name { font-weight:500; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.file-size { font-size:12px; color:var(--muted); margin-top:2px; }
.btn-remove { width:34px; height:34px; border:1.5px solid var(--border); border-radius:50%; background:white; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; color:var(--muted); transition:all .2s; flex-shrink:0; }
.btn-remove:hover { border-color:#e55; color:#e55; }

.options-panel { background:white; border:1.5px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.panel-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
.panel-header h2 { font-size:15px; font-weight:600; }
.options-grid { display:grid; grid-template-columns:1fr 1fr; }
.option-item { padding:16px 20px; border-bottom:1px solid var(--border); border-right:1px solid var(--border); }
.option-item:nth-child(even) { border-right:none; }
.option-item:nth-last-child(-n+2) { border-bottom:none; }
.option-label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; margin-bottom:7px; }
.select-wrap { position:relative; }
.select-wrap::after { content:'⌄'; position:absolute; right:12px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; }
select { width:100%; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--ink); background:var(--cream); border:1.5px solid var(--border); border-radius:10px; padding:9px 12px; appearance:none; cursor:pointer; outline:none; }
select:focus { border-color:var(--accent); }

.error-card { background:#fff4f2; border:1.5px solid #f4b8a8; border-radius:var(--radius); padding:18px 20px; display:flex; gap:12px; align-items:flex-start; animation:slideIn .3s; }
.error-card span:first-child { font-size:20px; flex-shrink:0; }
.error-text strong { display:block; font-size:14px; margin-bottom:3px; color:#c0392b; }
.error-text p { font-size:12px; color:#9e6450; }

.progress-wrap { background:white; border:1.5px solid var(--border); border-radius:var(--radius); padding:26px 22px; text-align:center; animation:slideIn .3s; }
.progress-label { font-size:14px; color:var(--muted); margin-bottom:14px; }
.progress-bar-track { height:6px; background:var(--cream); border-radius:3px; overflow:hidden; margin-bottom:6px; }
.progress-bar-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--gold)); border-radius:3px; transition:width .4s ease; width:0%; }
.progress-pct { font-size:12px; color:var(--muted); }

.success-card { background:#edf7f1; border:1.5px solid #a8d8b9; border-radius:var(--radius); padding:28px 22px; text-align:center; animation:slideIn .4s; }
.success-icon { font-size:48px; margin-bottom:10px; display:block; }
.success-title { font-family:'DM Serif Display',serif; font-size:22px; color:var(--success); margin-bottom:5px; }
.success-sub { font-size:13px; color:#5a9e72; margin-bottom:20px; }
.success-actions { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:14px; }
.btn-action { display:inline-flex; align-items:center; gap:7px; padding:12px 20px; border-radius:50px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; cursor:pointer; border:none; transition:all .2s; -webkit-tap-highlight-color:transparent; }
.btn-preview { background:white; color:var(--ink); border:2px solid var(--ink); }
.btn-preview:hover { background:var(--cream); }
.btn-save { background:var(--accent); color:white; box-shadow:0 4px 16px rgba(200,80,26,.25); }
.btn-save:hover { background:#b03f0e; }
.btn-again { display:inline-flex; align-items:center; gap:7px; background:transparent; color:var(--muted); border:1.5px solid var(--border); padding:10px 20px; border-radius:50px; font-family:'DM Sans',sans-serif; font-size:13px; cursor:pointer; transition:all .2s; }
.btn-again:hover { border-color:var(--ink); color:var(--ink); }

/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(26,20,16,.75); backdrop-filter:blur(4px); z-index:1000; display:flex; align-items:flex-end; animation:fadeIn .2s; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal-box { width:100%; height:92vh; background:white; border-radius:24px 24px 0 0; display:flex; flex-direction:column; overflow:hidden; animation:slideUp .3s ease; }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-header { display:flex; align-items:center; justify-content:space-between; padding:16px 18px; border-bottom:1px solid var(--border); font-weight:600; font-size:14px; background:var(--cream); }
.modal-close { width:34px; height:34px; border-radius:50%; border:none; background:var(--border); font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.preview-frame { flex:1; border:none; width:100%; background:#f5f5f5; }
.modal-footer { padding:14px 18px; border-top:1px solid var(--border); display:flex; justify-content:center; }
.modal-footer .btn-save { width:100%; max-width:300px; justify-content:center; }

.btn-convert { display:flex; align-items:center; justify-content:center; gap:10px; width:100%; background:var(--accent); color:white; border:none; padding:19px; border-radius:var(--radius); font-family:'DM Serif Display',serif; font-size:21px; cursor:pointer; transition:all .25s; box-shadow:0 8px 32px rgba(200,80,26,.25); -webkit-tap-highlight-color:transparent; }
.btn-convert:hover:not(:disabled) { background:#b03f0e; transform:translateY(-2px); }
.btn-convert:disabled { background:var(--border); color:var(--muted); cursor:not-allowed; box-shadow:none; }

.tip { display:flex; gap:10px; align-items:center; padding:12px 16px; background:var(--accent-light); border-radius:12px; font-size:12px; color:#8a4020; }
.tip span:first-child { font-size:16px; flex-shrink:0; }
.hidden { display:none !important; }
</style>
</head>
<body>
<header>
  <div class="logo-mark">D</div>
  <div class="header-text">
    <h1>DocFlow</h1>
    <p>Word → PDF コンバーター for iPad</p>
  </div>
  <div class="ver-badge">v3.0.0</div>
</header>

<main>
  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">📄</div>
    <div class="drop-title">ファイルをここにドロップ</div>
    <div class="drop-sub">.docx / .doc に対応</div>
    <button class="btn-browse" onclick="document.getElementById('fileInput').click()">
      📂 ファイルを選択
    </button>
    <input type="file" id="fileInput" accept=".docx,.doc,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/msword">
  </div>

  <div class="file-card hidden" id="fileCard">
    <div class="file-icon">📝</div>
    <div class="file-info">
      <div class="file-name" id="fileName">—</div>
      <div class="file-size" id="fileSize">—</div>
    </div>
    <button class="btn-remove" onclick="resetFile()">✕</button>
  </div>

  <div class="options-panel">
    <div class="panel-header"><span>⚙️</span><h2>変換オプション</h2></div>
    <div class="options-grid">
      <div class="option-item">
        <div class="option-label">用紙サイズ</div>
        <div class="select-wrap">
          <select id="optPaper"><option value="a4">A4</option><option value="letter">Letter</option><option value="a3">A3</option></select>
        </div>
      </div>
      <div class="option-item">
        <div class="option-label">向き</div>
        <div class="select-wrap">
          <select id="optOrientation"><option value="portrait">縦（Portrait）</option><option value="landscape">横（Landscape）</option></select>
        </div>
      </div>
      <div class="option-item">
        <div class="option-label">余白</div>
        <div class="select-wrap">
          <select id="optMargin"><option value="10">標準</option><option value="5">狭い</option><option value="20">広い</option></select>
        </div>
      </div>
      <div class="option-item">
        <div class="option-label">画質</div>
        <div class="select-wrap">
          <select id="optScale"><option value="2">高品質</option><option value="1">標準</option><option value="3">最高品質</option></select>
        </div>
      </div>
    </div>
  </div>

  <div class="error-card hidden" id="errorCard">
    <span>⚠️</span>
    <div class="error-text">
      <strong>変換エラー</strong>
      <p id="errorMsg">—</p>
    </div>
  </div>

  <div class="progress-wrap hidden" id="progressWrap">
    <div class="progress-label" id="progressLabel">変換中...</div>
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill"></div></div>
    <div class="progress-pct" id="progressPct">0%</div>
  </div>

  <div class="success-card hidden" id="successCard">
    <span class="success-icon">✅</span>
    <div class="success-title">変換完了！</div>
    <div class="success-sub" id="successMsg">変換が完了しました</div>
    <div class="success-actions">
      <button class="btn-action btn-preview" onclick="openPreview()">👁 プレビュー</button>
      <button class="btn-action btn-save" onclick="savePdf()">💾 保存先を選ぶ</button>
    </div>
    <button class="btn-again" onclick="resetAll()">🔄 別のファイルを変換</button>
  </div>

  <div class="modal-overlay hidden" id="previewModal">
    <div class="modal-box">
      <div class="modal-header">
        <span id="previewTitle">preview.pdf</span>
        <button class="modal-close" onclick="closePreview()">✕</button>
      </div>
      <iframe id="previewFrame" class="preview-frame"></iframe>
      <div class="modal-footer">
        <button class="btn-action btn-save" onclick="savePdf()">💾 保存先を選ぶ</button>
      </div>
    </div>
  </div>

  <button class="btn-convert" id="btnConvert" disabled onclick="startConvert()">
    🚀 PDFに変換する
  </button>

  <div class="tip">
    <span>💡</span>
    <span id="tipText">変換後にプレビューを確認し、好きなフォルダに保存できます。</span>
  </div>
</main>

<script>
// ── グローバル状態 ──
let selectedFile = null;
let isConverting = false;
let currentPdfBlob = null;
let currentBaseName = '';

// ── DOM参照 ──
const dropZone    = document.getElementById('dropZone');
const fileInput   = document.getElementById('fileInput');
const fileCard    = document.getElementById('fileCard');
const fileNameEl  = document.getElementById('fileName');
const fileSizeEl  = document.getElementById('fileSize');
const btnConvert  = document.getElementById('btnConvert');
const progressWrap= document.getElementById('progressWrap');
const progressFill= document.getElementById('progressFill');
const progressLabel=document.getElementById('progressLabel');
const progressPct = document.getElementById('progressPct');
const successCard = document.getElementById('successCard');
const successMsg  = document.getElementById('successMsg');
const errorCard   = document.getElementById('errorCard');
const errorMsgEl  = document.getElementById('errorMsg');

// ── ドラッグ&ドロップ ──
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
  const name = file.name.toLowerCase();
  if (!name.endsWith('.docx') && !name.endsWith('.doc')) {
    showError('.docx または .doc ファイルを選択してください。');
    return;
  }
  selectedFile = file;
  fileNameEl.textContent = file.name;
  fileSizeEl.textContent = fmtSize(file.size);
  fileCard.classList.remove('hidden');
  dropZone.classList.add('has-file');
  dropZone.querySelector('.drop-title').textContent = '別のファイルをドロップして置換';
  btnConvert.disabled = false;
  errorCard.classList.add('hidden');
  successCard.classList.add('hidden');
  currentPdfBlob = null;
}

function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}

function resetFile() {
  selectedFile = null;
  fileCard.classList.add('hidden');
  dropZone.classList.remove('has-file');
  dropZone.querySelector('.drop-title').textContent = 'ファイルをここにドロップ';
  btnConvert.disabled = true;
  fileInput.value = '';
  errorCard.classList.add('hidden');
}

function resetAll() {
  resetFile();
  successCard.classList.add('hidden');
  progressWrap.classList.add('hidden');
  closePreview();
  currentPdfBlob = null;
  currentBaseName = '';
  document.getElementById('tipText').textContent = '変換後にプレビューを確認し、好きなフォルダに保存できます。';
}

function showError(msg) {
  errorCard.classList.remove('hidden');
  errorMsgEl.textContent = msg;
  successCard.classList.add('hidden');
  progressWrap.classList.add('hidden');
}

function setProgress(pct, label) {
  progressFill.style.width = pct + '%';
  progressPct.textContent = pct + '%';
  progressLabel.textContent = label;
}

// ── プレビュー ──
function openPreview() {
  if (!currentPdfBlob) return;
  const url = URL.createObjectURL(currentPdfBlob);
  const frame = document.getElementById('previewFrame');
  frame.src = url;
  document.getElementById('previewTitle').textContent = currentBaseName + '.pdf';
  document.getElementById('previewModal').classList.remove('hidden');
}
function closePreview() {
  const modal = document.getElementById('previewModal');
  if (!modal) return;
  modal.classList.add('hidden');
  const frame = document.getElementById('previewFrame');
  if (frame.src) { URL.revokeObjectURL(frame.src); frame.src = ''; }
}

// ── 保存（Web Share API → フォールバック） ──
async function savePdf() {
  if (!currentPdfBlob) return;
  const fileName = currentBaseName + '.pdf';
  const file = new File([currentPdfBlob], fileName, { type: 'application/pdf' });

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: fileName });
      document.getElementById('tipText').textContent = '✅ 共有メニューから「ファイルに保存」で好きなフォルダに保存できます。';
      return;
    } catch(e) {
      if (e.name === 'AbortError') return;
    }
  }
  // フォールバック: 通常ダウンロード
  const url = URL.createObjectURL(currentPdfBlob);
  const a = document.createElement('a');
  a.href = url; a.download = fileName;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

// ── メイン変換処理 ──
async function startConvert() {
  if (!selectedFile || isConverting) return;
  isConverting = true;
  btnConvert.disabled = true;
  errorCard.classList.add('hidden');
  successCard.classList.add('hidden');
  progressWrap.classList.remove('hidden');
  setProgress(5, 'ファイルを読み込み中...');

  try {
    const arrayBuffer = await selectedFile.arrayBuffer();
    setProgress(20, 'Wordを解析中...');

    // mammoth で DOCX→HTML変換（messagesは使わない）
    const { value: htmlContent } = await mammoth.convertToHtml(
      { arrayBuffer },
      { styleMap: [] }   // 余分なstyleマップを無効化
    );

    if (!htmlContent || htmlContent.trim() === '') {
      throw new Error('ドキュメントの内容を読み取れませんでした。ファイルが壊れているか、保護されている可能性があります。');
    }

    setProgress(40, 'レイアウトを構築中...');

    // 用紙設定
    const paper  = document.getElementById('optPaper').value;
    const orient = document.getElementById('optOrientation').value;
    const margin = parseInt(document.getElementById('optMargin').value, 10);
    const scale  = parseInt(document.getElementById('optScale').value, 10);
    const paperSizes = { a4:[210,297], letter:[215.9,279.4], a3:[297,420] };
    let [pw, ph] = paperSizes[paper] || [210,297];
    if (orient === 'landscape') [pw, ph] = [ph, pw];

    const baseName = selectedFile.name.replace(/\.(docx?|DOCx?)$/i, '');
    currentBaseName = baseName;

    // レンダリング用コンテナを作成
    const MM_TO_PX = 3.7795275591;
    const contentWidthMm = pw - margin * 2;
    const contentWidthPx = Math.floor(contentWidthMm * MM_TO_PX);

    const wrapper = document.createElement('div');
    wrapper.style.cssText = [
      'position:fixed', 'top:0', 'left:-9999px',
      `width:${contentWidthPx}px`,
      'background:#ffffff',
      'color:#1a1a1a',
      'font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Meiryo",sans-serif',
      'font-size:10.5pt',
      'line-height:1.75',
      'word-break:break-word',
      'overflow-wrap:break-word',
      `padding:${margin * MM_TO_PX}px`
    ].join(';');

    // スタイル付きコンテンツ
    wrapper.innerHTML = `
      <style>
        h1{font-size:18pt;font-weight:700;margin:0 0 10pt;border-bottom:2px solid #c8501a;padding-bottom:5pt}
        h2{font-size:14pt;font-weight:700;margin:12pt 0 6pt}
        h3,h4,h5,h6{font-size:11pt;font-weight:600;margin:8pt 0 4pt}
        p{margin:0 0 7pt}
        ul,ol{margin:0 0 7pt;padding-left:18pt}
        li{margin-bottom:3pt}
        table{border-collapse:collapse;width:100%;margin:8pt 0;font-size:9.5pt}
        td,th{border:1px solid #bbb;padding:4pt 7pt;vertical-align:top}
        th{background:#f0ece3;font-weight:600}
        img{max-width:100%;height:auto}
        a{color:#c8501a}
        strong,b{font-weight:700}
        em,i{font-style:italic}
        blockquote{border-left:3px solid #c8501a;margin:8pt 0;padding:4pt 10pt;background:#faf8f4}
        pre,code{font-family:monospace;font-size:9pt;background:#f0ece3;padding:2pt 5pt;border-radius:3pt}
      </style>
      ${htmlContent}
    `;

    document.body.appendChild(wrapper);

    // フォント・画像の読み込み完了を待つ
    await new Promise(r => setTimeout(r, 600));
    setProgress(60, 'ページを画像化中...');

    const canvas = await html2canvas(wrapper, {
      scale: scale,
      useCORS: true,
      allowTaint: true,
      logging: false,
      backgroundColor: '#ffffff',
      width: wrapper.offsetWidth,
      height: wrapper.scrollHeight,
      windowWidth: wrapper.offsetWidth
    });

    document.body.removeChild(wrapper);
    setProgress(80, 'PDFを生成中...');

    // jsPDF インスタンス生成（window.jspdf.jsPDF を使用）
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({
      orientation: orient === 'landscape' ? 'l' : 'p',
      unit: 'mm',
      format: [pw, ph],
      compress: true
    });

    const pageContentH = ph - margin * 2;  // ページ当たりのコンテンツ高さ(mm)
    const totalImgH = (canvas.height / canvas.width) * contentWidthMm; // 画像全体の高さ(mm)

    let srcOffsetMm = 0;
    let isFirstPage = true;

    while (srcOffsetMm < totalImgH) {
      if (!isFirstPage) doc.addPage([pw, ph], orient === 'landscape' ? 'l' : 'p');
      isFirstPage = false;

      const sliceHmm = Math.min(pageContentH, totalImgH - srcOffsetMm);
      const ratio = canvas.height / totalImgH;
      const srcY  = Math.floor(srcOffsetMm * ratio);
      const srcH  = Math.floor(sliceHmm * ratio);

      // スライスcanvas
      const sliceCanvas = document.createElement('canvas');
      sliceCanvas.width  = canvas.width;
      sliceCanvas.height = srcH;
      const ctx = sliceCanvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, sliceCanvas.width, sliceCanvas.height);
      ctx.drawImage(canvas, 0, srcY, canvas.width, srcH, 0, 0, canvas.width, srcH);

      const imgData = sliceCanvas.toDataURL('image/jpeg', 0.92);
      doc.addImage(imgData, 'JPEG', margin, margin, contentWidthMm, sliceHmm, '', 'FAST');

      srcOffsetMm += pageContentH;
    }

    setProgress(95, '仕上げ中...');

    // ★ output('blob') のみ — save() は絶対に呼ばない → txtファイル生成なし
    currentPdfBlob = doc.output('blob');

    setProgress(100, '完了！');
    await new Promise(r => setTimeout(r, 400));

    progressWrap.classList.add('hidden');
    successCard.classList.remove('hidden');
    successMsg.textContent = `「${baseName}.pdf」の変換が完了しました`;
    isConverting = false;
    btnConvert.disabled = false;

  } catch(err) {
    console.error(err);
    progressWrap.classList.add('hidden');
    showError(err.message || '変換に失敗しました。ファイルを確認してください。');
    isConverting = false;
    btnConvert.disabled = false;
  }
}
</script>
</body>
</html>
